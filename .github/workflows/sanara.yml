name: sanara
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  remediate:
    if: github.actor == 'MayurP16'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "Sanara[bot]"
          git config user.email "sanara-bot@users.noreply.github.com"

      - uses: MayurP16/sanara@sanara-action
        with:
          allow_agentic: "false"
          publish_dry_run: "false"
          llm_context_mode: "module"
          llm_provider: "anthropic"
          agentic_max_attempts: "5"
          anthropic_model: "claude-sonnet-4-6"
          plan_required: "false"
          log_level: "INFO"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanara-artifacts
          path: artifacts
